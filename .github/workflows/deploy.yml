name: Deploy

# Baut die Astro-Seite und laedt dist/ per FTPS auf den Hetzner-Webspace.
# FTP-Zugang liegt als GitHub Secret (FTP_SERVER / FTP_USERNAME / FTP_PASSWORD).
# Ziel: friends.steine-steuern.de — der FTP-Account (steineaf_0) zeigt direkt
# in den Docroot der Subdomain, daher mirror-Ziel ./ und --delete ist sicher.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: FTPS Deploy (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 2;
            set net:timeout 20;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            mirror -R --delete --verbose --exclude-glob .git* ./dist/ ./;
          "
