  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3daa69ba-4a28-44de-953a-e728774fcddb\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n@font-face{font-family:\"Baskervville\";src:url(\"44464068-0d13-4d28-8639-c78c3b6df60d\");font-weight:400 700;font-style:normal;font-display:swap;}\n@font-face{font-family:\"Baskervville\";src:url(\"812d8865-159a-474a-a62e-ee54e5bb840e\");font-weight:400 700;font-style:italic;font-display:swap;}\n@font-face{font-family:\"Host Grotesk\";src:url(\"4472a721-9ba2-4007-87cd-59d301074d82\");font-weight:300 800;font-style:normal;font-display:swap;}\n@font-face{font-family:\"Host Grotesk\";src:url(\"3be5524a-8c6c-419f-9624-25d90395d127\");font-weight:300 800;font-style:italic;font-display:swap;}\nhtml,body{margin:0;padding:0;background:#F8F8F4;}\nhtml{scroll-behavior:smooth;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"font-family:'Host Grotesk',system-ui,sans-serif; color:#0F1B18; background:#F8F8F4;\">\n\n  <!-- ============ STICKY NAV ============ -->\n  <nav style=\"position:sticky; top:0; z-index:50; background:rgba(248,248,244,0.92); backdrop-filter:blur(8px); border-bottom:1px solid #E7E9E4;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px; height:56px; display:flex; align-items:center; justify-content:space-between; gap:32px;\">\n      <a href=\"#cover\" style=\"display:flex; align-items:center; gap:14px; text-decoration:none; color:#0F1B18;\">\n        <img src=\"1099c334-1a0b-43ed-9371-80968dc62380\" alt=\"Steine Steuern\" style=\"width:44px; display:block;\">\n        <span style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Corporate Design Manual<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display:flex; gap:22px; font-size:12px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;\">\n        <a href=\"#essenz\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Essenz<\u002Fa>\n        <a href=\"#logo\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Logo<\u002Fa>\n        <a href=\"#farbe\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Farbe<\u002Fa>\n        <a href=\"#typografie\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Typografie<\u002Fa>\n        <a href=\"#layout\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Layout<\u002Fa>\n        <a href=\"#bausteine\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Bausteine<\u002Fa>\n        <a href=\"#sprache\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Sprache<\u002Fa>\n        <a href=\"#dodont\" style=\"color:#605E5D; text-decoration:none;\" style-hover=\"color:#12A45E;\">Do &amp; Don't<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ============ COVER ============ -->\n  <header id=\"cover\" data-screen-label=\"Cover\" style=\"border-bottom:1px solid #E7E9E4;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px; display:grid; grid-template-columns:1.35fr 1fr; min-height:calc(100vh - 57px);\">\n      <div style=\"display:flex; flex-direction:column; justify-content:space-between; padding:88px 72px 56px 0; border-right:1px solid #E7E9E4;\">\n        <div style=\"display:flex; flex-direction:column; gap:40px;\">\n          <div style=\"display:flex; align-items:baseline; gap:20px; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">\n            <span style=\"color:#12A45E; font-weight:600;\">Steine &amp; Steuern<\u002Fspan>\n            <span>by Jasper Schouw<\u002Fspan>\n          <\u002Fdiv>\n          <h1 style=\"font-family:'Baskervville',Georgia,serif; font-weight:400; font-size:clamp(56px,7vw,92px); line-height:1.02; margin:0; letter-spacing:-0.01em;\">Corporate<br>Design<br><em style=\"font-style:italic; color:#1EC677;\">Manual<\u002Fem><\u002Fh1>\n          <p style=\"font-size:17px; line-height:1.65; color:#605E5D; max-width:30em; margin:0;\">Das verbindliche Erscheinungsbild einer Marke, die zwei Welten verbindet: die Solidität von Immobilien und die Cleverness der Steueroptimierung.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:0; border-top:1px solid #E7E9E4; padding-top:24px; font-size:13px; color:#605E5D;\">\n          <div style=\"flex:1; display:flex; flex-direction:column; gap:2px;\"><span style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#A5A9A5;\">Version<\u002Fspan><span style=\"font-variant-numeric:tabular-nums;\">1.0<\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; gap:2px;\"><span style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#A5A9A5;\">Stand<\u002Fspan><span style=\"font-variant-numeric:tabular-nums;\">03.07.2026<\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1.6; display:flex; flex-direction:column; gap:2px;\"><span style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#A5A9A5;\">Geltung<\u002Fspan><span>Web · Landingpages · Kommunikation<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"flex:1.6; background:#045D24; display:grid; place-items:center; padding:48px;\">\n          <img src=\"0bec11e7-9697-48e5-a868-1eeff3faa1d2\" alt=\"Steine Steuern Wortmarke\" style=\"width:min(64%,240px);\">\n        <\u002Fdiv>\n        <div style=\"flex:0.28; background:#1EC677;\"><\u002Fdiv>\n        <div style=\"flex:0.18; background:#A0D3B8;\"><\u002Fdiv>\n        <div style=\"flex:0.12; background:#DDF0E1;\"><\u002Fdiv>\n        <div style=\"flex:0.1; background:#F8BF4C;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ 01 MARKENESSENZ ============ -->\n  <section id=\"essenz\" data-screen-label=\"01 Markenessenz\" style=\"border-bottom:1px solid #E7E9E4; scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#A0D3B8;\">01<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Eins<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0; text-wrap:balance;\">Markenessenz — Substanz trifft <span style=\"color:#1EC677;\">Cleverness.<\u002Fspan><\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.65; color:#605E5D; max-width:38em; margin:0;\">„Steine\" stehen für Vertrauen und Beständigkeit, „Steuern\" für kluge Optimierung. Der Auftritt ist entsprechend: seriös, aber nie steif. Direkt, ehrlich, hochwertig ruhig.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid #E7E9E4;\">\n        <sc-for list=\"{{ attributes }}\" as=\"a\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid; grid-template-columns:80px 1fr 1.6fr; gap:32px; padding:32px 0; border-bottom:1px solid #E7E9E4; align-items:baseline;\">\n            <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:22px; color:#1EC677; font-variant-numeric:tabular-nums;\">{{ a.no }}<\u002Fdiv>\n            <div style=\"font-family:'Baskervville',serif; font-size:26px; line-height:1.2;\">{{ a.title }}<\u002Fdiv>\n            <div style=\"font-size:16px; line-height:1.65; color:#605E5D;\">{{ a.text }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"padding:104px 0; text-align:center; display:flex; flex-direction:column; gap:20px; align-items:center;\">\n        <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Leitprinzip<\u002Fdiv>\n        <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:clamp(32px,4.5vw,54px); line-height:1.2; max-width:18em; text-wrap:balance;\">Ein Grün, ein Gold, viel Ruhe. <span style=\"color:#1EC677;\">Farbe ist Bedeutung —<\u002Fspan> nicht Dekoration.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 LOGO ============ -->\n  <section id=\"logo\" data-screen-label=\"02 Logo\" style=\"background:#FFFFFF; border-bottom:1px solid #E7E9E4; scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#DDF0E1;\">02<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Zwei<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0;\">Die Wortmarke<\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.65; color:#605E5D; max-width:38em; margin:0;\">Zweizeilig gestapelt, linksbündig, gesetzt in einer kräftigen Grotesk — wie zwei aufeinanderliegende Steine. Proportion 622 × 338. Nie zentriert stauchen, nie zeilenweise trennen.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#F8F8F4; border:1px solid #E7E9E4; padding:96px 48px; display:grid; place-items:center;\">\n        <img src=\"1099c334-1a0b-43ed-9371-80968dc62380\" alt=\"Wortmarke groß\" style=\"width:min(46%,340px);\">\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); border:1px solid #E7E9E4; border-top:none;\">\n        <figure style=\"margin:0; border-right:1px solid #E7E9E4;\">\n          <div style=\"background:#045D24; aspect-ratio:16/10; display:grid; place-items:center;\"><img src=\"0bec11e7-9697-48e5-a868-1eeff3faa1d2\" alt=\"Logo weiß\" style=\"width:44%;\"><\u002Fdiv>\n          <figcaption style=\"padding:20px 24px; display:flex; flex-direction:column; gap:4px;\">\n            <span style=\"font-weight:600; font-size:14px;\">Weiß<\u002Fspan>\n            <span style=\"font-size:13px; color:#605E5D; line-height:1.55;\">Auf Grün- und Dunkelflächen: Header, Footer, grüne Sektionen.<\u002Fspan>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n        <figure style=\"margin:0; border-right:1px solid #E7E9E4;\">\n          <div style=\"background:#F8F8F4; aspect-ratio:16/10; display:grid; place-items:center; border-bottom:1px solid #E7E9E4;\"><img src=\"1099c334-1a0b-43ed-9371-80968dc62380\" alt=\"Logo Ink\" style=\"width:44%;\"><\u002Fdiv>\n          <figcaption style=\"padding:20px 24px; display:flex; flex-direction:column; gap:4px;\">\n            <span style=\"font-weight:600; font-size:14px;\">Ink · #0F1B18<\u002Fspan>\n            <span style=\"font-size:13px; color:#605E5D; line-height:1.55;\">Auf hellen, cremefarbenen Flächen. Reines Schwarz vermeiden.<\u002Fspan>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n        <figure style=\"margin:0;\">\n          <div style=\"background:#FFFFFF; aspect-ratio:16/10; display:grid; place-items:center; border-bottom:1px solid #E7E9E4;\"><img src=\"e1343c36-9f94-4599-8a58-38a2e5036547\" alt=\"Logo grün\" style=\"width:44%;\"><\u002Fdiv>\n          <figcaption style=\"padding:20px 24px; display:flex; flex-direction:column; gap:4px;\">\n            <span style=\"font-weight:600; font-size:14px;\">Grün · #1EC677<\u002Fspan>\n            <span style=\"font-size:13px; color:#605E5D; line-height:1.55;\">Optional — nur wo Kontrast gesichert ist (Weißfläche, Sonderfälle).<\u002Fspan>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid #E7E9E4; border-top:none; margin-bottom:112px;\">\n        <div style=\"padding:40px; border-right:1px solid #E7E9E4; display:flex; flex-direction:column; gap:24px;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#12A45E; font-weight:600;\">Schutzraum &amp; Mindestgröße<\u002Fdiv>\n          <div style=\"background:#F8F8F4; padding:44px; display:grid; place-items:center;\">\n            <div style=\"border:1px dashed #A0D3B8; padding:26px;\">\n              <img src=\"1099c334-1a0b-43ed-9371-80968dc62380\" alt=\"Schutzraum\" style=\"width:130px; display:block;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px; font-size:15px; line-height:1.6; color:#605E5D;\">\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#1EC677;\">—<\u002Fspan> Rundum mindestens die Höhe des Kleinbuchstabens „e\" freihalten.<\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#1EC677;\">—<\u002Fspan> Mindestgröße digital: <strong style=\"color:#0F1B18;\">&nbsp;96 px Breite<\u002Fstrong><\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#1EC677;\">—<\u002Fspan> Seitenverhältnis nie ändern, immer linksbündig.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:40px; display:flex; flex-direction:column; gap:24px;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#E23A0E; font-weight:600;\">Don'ts<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column;\">\n            <div style=\"display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.55; color:#605E5D;\"><span style=\"color:#E23A0E; font-weight:600;\">✕<\u002Fspan> Verzerren, drehen oder neu einfärben (außer definierte Varianten)<\u002Fdiv>\n            <div style=\"display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.55; color:#605E5D;\"><span style=\"color:#E23A0E; font-weight:600;\">✕<\u002Fspan> Schatten oder Outline hinzufügen<\u002Fdiv>\n            <div style=\"display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.55; color:#605E5D;\"><span style=\"color:#E23A0E; font-weight:600;\">✕<\u002Fspan> Auf unruhigem Foto ohne Abdunkelung platzieren<\u002Fdiv>\n            <div style=\"display:flex; gap:14px; padding:14px 0; font-size:15px; line-height:1.55; color:#605E5D;\"><span style=\"color:#E23A0E; font-weight:600;\">✕<\u002Fspan> Zentriert stauchen oder zeilenweise trennen<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 FARBE ============ -->\n  <section id=\"farbe\" data-screen-label=\"03 Farbe\" style=\"border-bottom:1px solid #E7E9E4; scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px 112px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#A0D3B8;\">03<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Drei<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0; text-wrap:balance;\">Farbe — Grün und Cream tragen alles. <span style=\"color:#1EC677;\">Gold ist die einzige Aktionsfarbe.<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Primärfarben als \"Steine\" -->\n      <div style=\"display:flex; flex-direction:column; gap:2px;\">\n        <sc-for list=\"{{ primaryColors }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <div style=\"background:{{ c.hex }}; border:1px solid #E7E9E4; padding:36px 40px; display:grid; grid-template-columns:1.2fr 0.6fr 2fr; gap:24px; align-items:baseline;\">\n            <div style=\"font-family:'Baskervville',serif; font-size:30px; color:{{ c.fg }};\">{{ c.name }}<\u002Fdiv>\n            <div style=\"font-size:14px; color:{{ c.fgMuted }}; font-variant-numeric:tabular-nums; letter-spacing:0.04em;\">{{ c.hex }}<\u002Fdiv>\n            <div style=\"font-size:15px; line-height:1.6; color:{{ c.fgMuted }};\">{{ c.role }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Grün-Skala -->\n      <div style=\"margin-top:72px; display:flex; flex-direction:column; gap:24px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n          <h3 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:28px; margin:0;\">Grün-Skala<\u002Fh3>\n          <span style=\"font-size:13px; color:#A5A9A5;\">Dunkle Sektionen &amp; Footer: flächiges Grün-800 · kein Verlauf<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(8,1fr); border:1px solid #E7E9E4;\">\n          <sc-for list=\"{{ greenScale }}\" as=\"g\" hint-placeholder-count=\"8\">\n            <div style=\"background:{{ g.hex }}; height:170px; padding:16px 14px; display:flex; flex-direction:column; justify-content:flex-end; gap:2px;\">\n              <div style=\"font-size:12px; font-weight:600; color:{{ g.labelColor }};\">{{ g.step }}<\u002Fdiv>\n              <div style=\"font-size:11px; color:{{ g.labelColor }}; opacity:0.7; font-variant-numeric:tabular-nums;\">{{ g.hex }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Gold + Neutrale -->\n      <div style=\"margin-top:72px; display:grid; grid-template-columns:1fr 1.4fr; gap:0; border:1px solid #E7E9E4;\">\n        <div style=\"padding:40px; border-right:1px solid #E7E9E4; display:flex; flex-direction:column; gap:24px; background:#FFFFFF;\">\n          <h3 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:28px; margin:0;\">Gold — Aktion<\u002Fh3>\n          <div style=\"display:flex; flex-direction:column; gap:2px;\">\n            <div style=\"background:#FDF0D2; padding:18px 22px; display:flex; justify-content:space-between; font-size:13px;\"><span style=\"font-weight:600;\">100 · Tint<\u002Fspan><span style=\"color:#605E5D; font-variant-numeric:tabular-nums;\">#FDF0D2<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#F8BF4C; padding:26px 22px; display:flex; justify-content:space-between; font-size:13px;\"><span style=\"font-weight:600;\">500 ★ · Primär-Button<\u002Fspan><span style=\"font-variant-numeric:tabular-nums;\">#F8BF4C<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#E9A82F; padding:18px 22px; display:flex; justify-content:space-between; font-size:13px;\"><span style=\"font-weight:600;\">600 · Hover<\u002Fspan><span style=\"font-variant-numeric:tabular-nums;\">#E9A82F<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; color:#605E5D; margin:0;\">Buttonschrift auf Gold: <strong style=\"color:#0F1B18;\">Ink<\u002Fstrong>, nie Weiß. Gold ist nie Flächenfarbe — nur der eine Klick, der zählt.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:40px; display:flex; flex-direction:column; gap:24px; background:#FFFFFF;\">\n          <h3 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:28px; margin:0;\">Neutrale &amp; Signal<\u002Fh3>\n          <div style=\"display:flex; flex-direction:column;\">\n            <sc-for list=\"{{ neutralColors }}\" as=\"n\" hint-placeholder-count=\"6\">\n              <div style=\"display:grid; grid-template-columns:44px 130px 90px 1fr; gap:16px; align-items:center; padding:11px 0; border-bottom:1px solid #E7E9E4;\">\n                <div style=\"width:36px; height:36px; background:{{ n.hex }}; border:1px solid #E7E9E4;\"><\u002Fdiv>\n                <div style=\"font-size:14px; font-weight:600;\">{{ n.name }}<\u002Fdiv>\n                <div style=\"font-size:13px; color:#A5A9A5; font-variant-numeric:tabular-nums;\">{{ n.hex }}<\u002Fdiv>\n                <div style=\"font-size:13px; color:#605E5D;\">{{ n.role }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 60/30/10 -->\n      <div style=\"margin-top:72px; display:flex; flex-direction:column; gap:20px;\">\n        <h3 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:28px; margin:0;\">Farbverhältnis 60 / 30 / 10<\u002Fh3>\n        <div style=\"display:flex; height:96px; border:1px solid #E7E9E4;\">\n          <div style=\"flex:60; background:#F8F8F4; display:grid; place-items:center; font-size:14px; color:#605E5D;\">60 % Cream / Weiß<\u002Fdiv>\n          <div style=\"flex:30; background:#1EC677; display:grid; place-items:center; font-size:14px; color:#FFFFFF;\">30 % Grün<\u002Fdiv>\n          <div style=\"flex:8; background:#0F1B18; display:grid; place-items:center; font-size:12px; color:#FFFFFF;\">Ink<\u002Fdiv>\n          <div style=\"flex:2; background:#F8BF4C;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px; color:#605E5D; margin:0; max-width:56em; line-height:1.6;\">Kontrast: WCAG <strong style=\"color:#0F1B18;\">AA<\u002Fstrong> (≥ 4,5:1 für Fließtext). Ink auf Cream und Weiß auf Grün-800/900 sind sicher; Weiß auf #1EC677 nur für große, fette Typografie.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 04 TYPOGRAFIE ============ -->\n  <section id=\"typografie\" data-screen-label=\"04 Typografie\" style=\"background:#FFFFFF; border-bottom:1px solid #E7E9E4; scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px 112px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#DDF0E1;\">04<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Vier<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0;\">Zwei Familien, klare Rollen<\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.65; color:#605E5D; max-width:38em; margin:0;\">Serif nie für Fließtext, Grotesk nie für Hero-Headlines — die Rollentrennung ist Teil der Marke. Type-Scale ≈ 1.25, Zeilenlänge 60–75 Zeichen.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; border:1px solid #E7E9E4;\">\n        <div style=\"padding:56px 48px; border-right:1px solid #E7E9E4; display:flex; flex-direction:column; gap:28px;\">\n          <div style=\"font-family:'Baskervville',serif; font-size:clamp(90px,10vw,150px); line-height:0.9;\">Aa<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:6px;\">\n            <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#12A45E; font-weight:600;\">Display / Headlines<\u002Fdiv>\n            <div style=\"font-family:'Baskervville',serif; font-size:26px;\">Baskervville<\u002Fdiv>\n            <p style=\"font-size:15px; color:#605E5D; line-height:1.6; margin:0;\">Elegant, redaktionell, vertrauenswürdig. Trägt alle Überschriften und die großen Stat-Zahlen. Variable, 400–700 + Italics, OFL.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'Baskervville',serif; font-size:17px; color:#605E5D; border-top:1px solid #E7E9E4; padding-top:20px; line-height:1.6;\">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 0123456789 äöüß <em>Kursiv für Betonung<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:56px 48px; display:flex; flex-direction:column; gap:28px;\">\n          <div style=\"font-weight:600; font-size:clamp(90px,10vw,150px); line-height:0.9;\">Aa<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:6px;\">\n            <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#12A45E; font-weight:600;\">Text / UI<\u002Fdiv>\n            <div style=\"font-weight:600; font-size:26px;\">Host Grotesk<\u002Fdiv>\n            <p style=\"font-size:15px; color:#605E5D; line-height:1.6; margin:0;\">Klar, modern, sachlich. Fließtext, Labels, Buttons, Formulare, Navigation. Variable, 300–800 + Italics, OFL.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-size:17px; color:#605E5D; border-top:1px solid #E7E9E4; padding-top:20px; line-height:1.6;\">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 0123456789 äöüß <strong>Fett für den Payoff<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Signatur-Muster -->\n      <div style=\"border:1px solid #E7E9E4; border-top:none; padding:88px 48px; display:flex; flex-direction:column; or:#1EC677; font-weight:700;\">✓<\u002Fspan> Du suchst System statt Bauchgefühl.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:44px; background:#F9ECEC; display:flex; flex-direction:column; gap:18px;\">\n          <div style=\"font-family:'Baskervville',serif; font-size:24px;\">🚫 Für wen das nicht ist<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; font-size:15px; line-height:1.6;\">\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#E23A0E; font-weight:700;\">✕<\u002Fspan> Du suchst schnelles Geld ohne Arbeit.<\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#E23A0E; font-weight:700;\">✕<\u002Fspan> Du willst zocken statt investieren.<\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#E23A0E; font-weight:700;\">✕<\u002Fspan> Du erwartest einen Guru mit 5.000-€-Upsell.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Header + Footer-CTA Demo -->\n      <div style=\"margin-top:48px; display:flex; flex-direction:column; gap:32px;\">\n        <div>\n          <div style=\"background:#1EC677; padding:18px 32px; display:flex; align-items:center; justify-content:space-between;\">\n            <img src=\"0bec11e7-9697-48e5-a868-1eeff3faa1d2\" alt=\"\" style=\"width:72px;\">\n            <div style=\"display:flex; gap:28px; color:#FFFFFF; font-size:14px; font-weight:500;\">\n              <span>Community<\u002Fspan><span>Über mich<\u002Fspan><span>FAQ<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:10px 2px; font-size:13px; color:#A5A9A5;\">Header · Organismus — grüne Bar, Logo weiß links. Auf hellen Seiten alternativ Cream-Header mit Ink-Logo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"background:#045D24; padding:72px 48px; display:flex; flex-direction:column; align-items:center; gap:28px; text-align:center;\">\n            <div style=\"font-family:'Baskervville',serif; font-size:clamp(28px,3.4vw,40px); line-height:1.15; color:#FFFFFF; max-width:18em; text-wrap:balance;\">Bereit, aus Einkommen <em style=\"font-style:italic; color:#1EC677;\">echtes Vermögen<\u002Fem> zu machen?<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center;\">\n              <span style=\"color:#A0D3B8; text-decoration:line-through; font-size:16px;\">120 €/Monat<\u002Fspan>\n              <button style=\"background:#F8BF4C; color:#0F1B18; font-family:'Host Grotesk',sans-serif; font-weight:600; font-size:16px; border:none; border-radius:999px; padding:14px 28px; cursor:pointer;\" style-hover=\"background:#E9A82F;\">Early Bird: 70 € /Monat →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:10px 2px; font-size:13px; color:#A5A9A5;\">Footer-CTA · Organismus — Grün-800-Fläche, weiße Serifen-Headline, Gold-CTA, durchgestrichener Alt-Preis.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 07 IKONOGRAFIE & BILD ============ -->\n  <section id=\"ikonografie\" data-screen-label=\"07 Ikonografie und Bild\" style=\"border-bottom:1px solid #E7E9E4; scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px 112px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#A0D3B8;\">07<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Sieben<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0;\">Ikonografie &amp; Bildsprache<\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.65; color:#605E5D; max-width:38em; margin:0;\">Dünne Linien, echte Menschen — kein generisches Stock-Business.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:64px;\">\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#12A45E; font-weight:600; padding-bottom:16px; border-bottom:1px solid #E7E9E4;\">Icons<\u002Fdiv>\n          <div style=\"padding:16px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#605E5D;\">Dünne bis mittlere Linien-Icons, konsistente Strichstärke, abgerundete Enden.<\u002Fdiv>\n          <div style=\"padding:16px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#605E5D;\">Größen an Zeilenhöhe koppeln: <span style=\"color:#0F1B18; font-variant-numeric:tabular-nums;\">16 / 20 / 24 px<\u002Fspan>.<\u002Fdiv>\n          <div style=\"padding:16px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#605E5D;\">Grün für positiv, Danger-Rot für Ausschluss, Ink für neutral.<\u002Fdiv>\n          <div style=\"padding:16px 0; font-size:15px; line-height:1.6; color:#605E5D;\">Keine Multicolor-Icons; Emoji nur sparsam als Marker (✅/🚫) in Marketing-Boxen.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#12A45E; font-weight:600; padding-bottom:16px; border-bottom:1px solid #E7E9E4;\">Fotografie<\u002Fdiv>\n          <div style=\"padding:16px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#605E5D;\">Echte Person (Jasper), authentische Coaching-Situationen, ruhige Portraits.<\u002Fdiv>\n          <div style=\"padding:16px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#605E5D;\">Natürliches Licht, warme, leicht entsättigte Töne — passend zum Cream/Grün-Klima.<\u002Fdiv>\n          <div style=\"padding:16px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#605E5D;\">Signature-Look: Portrait vor grüner Fläche.<\u002Fdiv>\n          <div style=\"padding:16px 0; font-size:15px; line-height:1.6; color:#605E5D;\">Karten-Bilder mit gleichem Eck-Radius wie die Karte; nie hart randabfallend.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 SPRACHE ============ -->\n  <section id=\"sprache\" data-screen-label=\"08 Sprache\" style=\"background:#FFFFFF; border-bottom:1px solid #E7E9E4; scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px 112px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#DDF0E1;\">08<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Acht<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0;\">Sprache — direkt, ehrlich, <span style=\"color:#1EC677;\">auf Augenhöhe.<\u002Fspan><\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.65; color:#605E5D; max-width:38em; margin:0;\">Durchgängig „Du\". Entlarvend statt anpreisend. Kurze Sätze, konkrete Zahlen, Frage-Antwort-Rhythmus. Fett hebt den Payoff hervor.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; border:1px solid #E7E9E4;\">\n        <div style=\"padding:44px; border-right:1px solid #E7E9E4; display:flex; flex-direction:column; gap:16px;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#12A45E; font-weight:600;\">So klingt es<\u002Fdiv>\n          <div style=\"font-family:'Baskervville',serif; font-size:24px; line-height:1.35;\">„Du verdienst gut — aber am Jahresende bleibt trotzdem zu wenig hängen? <span style=\"color:#1EC677;\">Genau dafür gibt es einen Plan.<\u002Fspan>\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:44px; display:flex; flex-direction:column; gap:16px; background:#F9ECEC;\">\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#E23A0E; font-weight:600;\">So nicht<\u002Fdiv>\n          <div style=\"font-size:17px; line-height:1.6; color:#605E5D;\">„🔥🔥 MEGA-Chance!!! Werde JETZT finanziell FREI mit dem ultimativen Geheim-System!!!\"<\u002Fdiv>\n          <div style=\"font-size:13px; color:#A5A9A5; line-height:1.6;\">Verboten: leere Buzzwords, Ausrufezeichen-Ketten, Angst-Rot als Verkaufsdruck.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 DO & DON'T ============ -->\n  <section id=\"dodont\" data-screen-label=\"09 Do und Dont\" style=\"scroll-margin-top:56px;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:0 48px 112px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 2fr; gap:48px; padding:96px 0 72px; align-items:end;\">\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:120px; line-height:0.85; color:#A0D3B8;\">09<\u002Fdiv>\n          <div style=\"font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#A5A9A5;\">Kapitel Neun<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:20px;\">\n          <h2 style=\"font-family:'Baskervville',serif; font-weight:400; font-size:clamp(36px,4vw,52px); line-height:1.08; margin:0;\">Do &amp; Don't — Kurzreferenz<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:64px;\">\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"font-family:'Baskervville',serif; font-size:28px; color:#058B35; padding-bottom:20px; border-bottom:2px solid #1EC677;\">Do<\u002Fdiv>\n          <sc-for list=\"{{ dos }}\" as=\"d\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; gap:16px; padding:17px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#0F1B18;\"><span style=\"color:#1EC677; font-weight:700;\">✓<\u002Fspan> {{ d }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"font-family:'Baskervville',serif; font-size:28px; color:#E23A0E; padding-bottom:20px; border-bottom:2px solid #E23A0E;\">Don't<\u002Fdiv>\n          <sc-for list=\"{{ donts }}\" as=\"d\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; gap:16px; padding:17px 0; border-bottom:1px solid #E7E9E4; font-size:15px; line-height:1.6; color:#0F1B18;\"><span style=\"color:#E23A0E; font-weight:700;\">✕<\u002Fspan> {{ d }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#045D24; color:#FFFFFF;\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:88px 48px 56px; display:flex; flex-direction:column; gap:56px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:32px; flex-wrap:wrap;\">\n        <img src=\"0bec11e7-9697-48e5-a868-1eeff3faa1d2\" alt=\"\" style=\"width:150px;\">\n        <div style=\"font-family:'Baskervville',serif; font-style:italic; font-size:clamp(24px,2.6vw,32px); line-height:1.3; color:#DDF0E1; max-width:16em; text-align:right;\">Ein Grün, ein Gold, <span style=\"color:#1EC677;\">viel Ruhe.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,0.18); padding-top:24px; display:flex; justify-content:space-between; gap:24px; flex-wrap:wrap; font-size:13px; color:#A0D3B8;\">\n        <span>Corporate Design Manual · Version 1.0 · Stand 03.07.2026<\u002Fspan>\n        <span>Baskervville · Host Grotesk · #1EC677 · #F8BF4C<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      gridCols: Array.from({ length: 12 }, (_, i) => i),\n      attributes: [\n        { no: \"①\", title: \"Seriös, aber nicht steif\", text: \"Serifen-Headlines (Vertrauen, Substanz) treffen auf frische, klare Grotesk-Fließtexte.\" },\n        { no: \"②\", title: \"Direkt & ehrlich\", text: \"Klare Aussagen, „Du\\u201c-Ansprache, kein Coaching-Bling-Bling. Grün als Signal für Wachstum — kein aggressives Rot als Verkaufsdruck.\" },\n        { no: \"③\", title: \"Hochwertig & ruhig\", text: \"Viel Weißraum, cremefarbene Flächen, ein einziges kräftiges Grün als Markenanker.\" },\n        { no: \"④\", title: \"Wachstum & Substanz\", text: \"Das Signature-Grün steht für Vermögenswachstum; Gold ausschließlich für den entscheidenden Handlungsimpuls (CTA).\" },\n      ],\n      primaryColors: [\n        { name: \"Brand Green\", hex: \"#1EC677\", fg: \"#FFFFFF\", fgMuted: \"#04441B\", role: \"Header, grüne Sektionen, Akzentwörter, Icons, Links, Stat-Zahlen. Die Marken-DNA.\" },\n        { name: \"Cream / Surface\", hex: \"#F8F8F4\", fg: \"#0F1B18\", fgMuted: \"#605E5D\", role: \"Standard-Seitenhintergrund. Ruhig, warm, hochwertig.\" },\n        { name: \"Ink\", hex: \"#0F1B18\", fg: \"#FFFFFF\", fgMuted: \"#A5A9A5\", role: \"Fließtext & Headlines auf hellem Grund — grünstichiges Fast-Schwarz, nie #000.\" },\n        { name: \"Gold / CTA\", hex: \"#F8BF4C\", fg: \"#0F1B18\", fgMuted: \"#0F1B18\", role: \"Ausschließlich für primäre Buttons — der eine Handlungsimpuls.\" },\n      ],\n      greenScale: [\n        { step: \"50\", hex: \"#ECF9EE\", labelColor: \"#058B35\" },\n        { step: \"100\", hex: \"#DDF0E1\", labelColor: \"#058B35\" },\n        { step: \"200\", hex: \"#A0D3B8\", labelColor: \"#04441B\" },\n        { step: \"500 ★\", hex: \"#1EC677\", labelColor: \"#FFFFFF\" },\n        { step: \"600\", hex: \"#12A45E\", labelColor: \"#FFFFFF\" },\n        { step: \"700\", hex: \"#058B35\", labelColor: \"#FFFFFF\" },\n        { step: \"800\", hex: \"#045D24\", labelColor: \"#FFFFFF\" },\n        { step: \"900\", hex: \"#04441B\", labelColor: \"#FFFFFF\" },\n      ],\n      neutralColors: [\n        { name: \"White\", hex: \"#FFFFFF\", role: \"Karten, Formulare, erhöhte Flächen\" },\n        { name: \"Line\", hex: \"#E7E9E4\", role: \"Rahmen, Trennlinien (1 px)\" },\n        { name: \"Ink 600\", hex: \"#605E5D\", role: \"Sekundärtext, FAQ-Antworten\" },\n        { name: \"Ink 400\", hex: \"#A5A9A5\", role: \"Eyebrows, Captions, disabled\" },\n        { name: \"Danger\", hex: \"#E23A0E\", role: \"✕-Icons, Alt-Preis, Ausschluss\" },\n        { name: \"Danger 50\", hex: \"#F9ECEC\", role: \"Hintergrund der Ausschluss-Boxen\" },\n      ],\n      typeRoles: [\n        { label: \"Eyebrow\", family: \"'Host Grotesk',sans-serif\", weight: \"500\", size: \"13px\", lh: \"1.2\", color: \"#A5A9A5\", tracking: \"0.12em\", transform: \"uppercase\", sample: \"Deine Vorteile\", spec: \"Host Grotesk 500 · 12–13 px\" },\n        { label: \"H1 / Hero\", family: \"'Baskervville',serif\", weight: \"400\", size: \"48px\", lh: \"1.1\", color: \"#0F1B18\", tracking: \"0\", transform: \"none\", sample: \"Echtes Vermögen\", spec: \"Baskervville 400 · 44–60 px · 1.1\" },\n        { label: \"H2 / Sektion\", family: \"'Baskervville',serif\", weight: \"400\", size: \"34px\", lh: \"1.15\", color: \"#0F1B18\", tracking: \"0\", transform: \"none\", sample: \"So funktioniert es\", spec: \"Baskervville 400 · 32–40 px · 1.15\" },\n        { label: \"H3 / Card\", family: \"'Baskervville',serif\", weight: \"500\", size: \"22px\", lh: \"1.25\", color: \"#0F1B18\", tracking: \"0\", transform: \"none\", sample: \"Die Steuer-Strategie\", spec: \"Baskervville 500 · 20–24 px · 1.25\" },\n        { label: \"Body\", family: \"'Host Grotesk',sans-serif\", weight: \"400\", size: \"17px\", lh: \"1.6\", color: \"#605E5D\", tracking: \"0\", transform: \"none\", sample: \"Du verdienst gut — aber am Jahresende bleibt zu wenig hängen.\", spec: \"Host Grotesk 400 · 16–18 px · 1.6\" },\n        { label: \"Stat-Zahl\", family: \"'Baskervville',serif\", weight: \"400\", size: \"48px\", lh: \"1\", color: \"#1EC677\", tracking: \"0\", transform: \"none\", sample: \"88+ Mio €\", spec: \"Baskervville 400 · 40–56 px · Grün\" },\n        { label: \"Button\", family: \"'Host Grotesk',sans-serif\", weight: \"600\", size: \"16px\", lh: \"1\", color: \"#0F1B18\", tracking: \"0\", transform: \"none\", sample: \"Jetzt Mitglied werden →\", spec: \"Host Grotesk 600 · 15–16 px\" },\n        { label: \"Nav / Meta\", family: \"'Host Grotesk',sans-serif\", weight: \"500\", size: \"14px\", lh: \"1\", color: \"#0F1B18\", tracking: \"0\", transform: \"none\", sample: \"Community · Über mich · FAQ\", spec: \"Host Grotesk 500 · 14 px\" },\n      ],\n      dos: [\n        \"Ein Grün, ein Gold, viel Cream/Weiß.\",\n        \"Serif für Headlines, Grotesk für alles andere.\",\n        \"Pro Headline max. ein grünes Akzent-Segment.\",\n        \"Gold nur für den einen entscheidenden CTA.\",\n        \"Großzügiger Weißraum, 4-px-Spacing, konsistente Radien.\",\n        \"Kontrast prüfen (WCAG AA).\",\n      ],\n      donts: [\n        \"Reines Schwarz #000 als Text — immer Ink #0F1B18.\",\n        \"Weiße Buttonschrift auf Gold.\",\n        \"Grotesk-Headlines oder Serifen-Fließtext.\",\n        \"Mehrere konkurrierende Akzentfarben oder Gold als Fläche.\",\n        \"Logo verzerren, einfärben oder auf unruhigem Grund.\",\n        \"Grün als reine Dekoration ohne Bedeutungsbezug.\",\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
